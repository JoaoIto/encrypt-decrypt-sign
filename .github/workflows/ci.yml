name: CI/CD Pipeline - Crypto Visualizer

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Run Unit and Integration Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Run Global Turbo Tests (Vitest + Supertest)
        run: npm run test

      - name: Validate System Build
        run: npm run build
