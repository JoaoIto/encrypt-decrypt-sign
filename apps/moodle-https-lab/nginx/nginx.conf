events {
    worker_connections 1024;
}

http {
    server {
        # Escutando apenas tráfego seguro na porta 443
        listen 443 ssl;
        server_name localhost;

        # Apontando para os certificados mapeados no container Docker
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # EXIGÊNCIA DA ACADEMIA: Somente TLS 1.3
        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Proxy reverso para o Moodle interno
        location / {
            proxy_pass http://moodle:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
