user  nginx;
worker_processes  auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─────────────────────────────────────────────────
    # Redirecionar TODO o tráfego HTTP → HTTPS
    # ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # ─────────────────────────────────────────────────
    # Servidor HTTPS com TLS 1.3 e RSA 4096
    # ─────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Somente TLS 1.3
        ssl_protocols TLSv1.3;
        # Nota: os ciphers do TLS 1.3 são gerenciados automaticamente pelo OpenSSL
        ssl_prefer_server_ciphers off;

        # Headers de Segurança
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-XSS-Protection "1; mode=block";

        # Proxy Reverso → Joomla (Apache interno na porta 80)
        location / {
            proxy_pass         http://joomla:80;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 120s;
        }
    }
}
